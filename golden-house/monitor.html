<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Golden House — Kjøkkenskjerm</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Patrick+Hand&family=Caveat:wght@500;700&display=swap" rel="stylesheet" />
  <style>
    :root{
      --slate:#1f2a26; --slate-2:#243430; --chalk:#f3f1e7; --chalk-soft:#b9c2bc;
      --red:#ff5a5f; --paper:#fbf7ea; --ink:#222; --tape:rgba(255,255,255,.5);
      --font-marker:"Permanent Marker",cursive; --font-hand:"Patrick Hand",sans-serif; --font-note:"Caveat",cursive;
    }
    *{box-sizing:border-box;}
    body{
      margin:0; min-height:100vh; color:var(--chalk);
      font-family:var(--font-hand); font-size:18px;
      background-color:var(--slate);
      background-image:
        radial-gradient(rgba(255,255,255,.05) 1px, transparent 1px),
        radial-gradient(rgba(255,255,255,.04) 1px, transparent 1px);
      background-size:7px 7px, 13px 13px; background-position:0 0, 4px 4px;
    }
    header{
      position:sticky; top:0; z-index:5;
      display:flex; align-items:center; justify-content:space-between; gap:16px; flex-wrap:wrap;
      padding:14px 22px; border-bottom:2px dashed rgba(243,241,231,.3);
      background:linear-gradient(180deg, var(--slate) 70%, rgba(31,42,38,.85));
    }
    h1{font-family:var(--font-marker); font-size:1.7rem; margin:0; color:var(--red);}
    h1 small{display:block; font-family:var(--font-note); font-size:1.1rem; color:var(--chalk-soft);}
    .head-right{display:flex; align-items:center; gap:14px; font-family:var(--font-note); font-size:1.25rem;}
    .clock{font-family:var(--font-marker); font-size:1.3rem;}
    .pill{background:var(--red); color:#fff; border-radius:20px; padding:3px 13px; font-family:var(--font-marker); font-size:1rem;}
    .btn{
      font-family:var(--font-hand); font-size:1rem; cursor:pointer;
      background:transparent; color:var(--chalk); border:2px solid var(--chalk-soft);
      border-radius:9px; padding:6px 12px;
    }
    .btn:hover{border-color:var(--chalk); background:rgba(255,255,255,.06);}

    .banner{
      margin:0; padding:8px 22px; font-family:var(--font-note); font-size:1.1rem;
      color:#0c0c0c; background:#ffe169; text-align:center;
    }

    .board{
      display:grid; gap:20px; padding:22px;
      grid-template-columns:repeat(auto-fill, minmax(290px, 1fr));
      align-items:start;
    }
    .empty{
      grid-column:1/-1; text-align:center; padding:80px 20px;
      color:var(--chalk-soft); font-family:var(--font-note); font-size:1.8rem;
    }
    .empty span{display:block; font-size:3rem; margin-bottom:8px;}

    .ticket{
      position:relative; color:var(--ink); background:var(--paper);
      border-radius:6px; padding:16px 16px 14px;
      box-shadow:0 10px 20px rgba(0,0,0,.4);
      animation:drop .35s ease;
    }
    .ticket:nth-child(3n){transform:rotate(-1.1deg);}
    .ticket:nth-child(3n+1){transform:rotate(.9deg);}
    .ticket:nth-child(3n+2){transform:rotate(-.4deg);}
    @keyframes drop{from{opacity:0; transform:translateY(-14px) rotate(0);} }
    /* tape */
    .ticket::before{
      content:""; position:absolute; top:-11px; left:50%; transform:translateX(-50%) rotate(-3deg);
      width:84px; height:22px; background:var(--tape);
      box-shadow:0 1px 2px rgba(0,0,0,.2);
    }
    .ticket.done{opacity:.5; filter:grayscale(.4);}
    .ticket__top{display:flex; justify-content:space-between; align-items:baseline; border-bottom:2px dashed rgba(0,0,0,.25); padding-bottom:8px; margin-bottom:8px;}
    .ticket__no{font-family:var(--font-marker); font-size:1.5rem; color:var(--red);}
    .ticket__time{font-family:var(--font-note); font-size:1.15rem; color:#555; text-align:right;}
    .ticket__cust{font-size:1.15rem; margin-bottom:4px;}
    .ticket__cust b{font-weight:bold;}
    .ticket__pickup{display:inline-block; font-family:var(--font-note); font-size:1.15rem; color:#fff; background:var(--ink); border-radius:6px; padding:0 10px; margin-bottom:8px;}
    .lines{list-style:none; margin:6px 0; padding:0;}
    .lines li{display:flex; justify-content:space-between; gap:10px; padding:3px 0; font-size:1.2rem;}
    .lines .q{font-family:var(--font-marker); color:var(--red); min-width:34px;}
    .lines .nm{flex:1;}
    .note{font-family:var(--font-note); font-size:1.2rem; color:#7a2; background:#fffce0; border-left:4px solid #e7c200; padding:6px 10px; margin:8px 0;}
    .note b{color:#a80;}
    .ticket__total{display:flex; justify-content:space-between; font-family:var(--font-marker); font-size:1.25rem; border-top:2px solid var(--ink); padding-top:8px; margin-top:8px;}
    .ticket__act{display:flex; gap:8px; margin-top:12px;}
    .done-btn{flex:1; font-family:var(--font-marker); font-size:1.1rem; cursor:pointer; background:#1c7c44; color:#fff; border:none; border-radius:9px; padding:10px;}
    .done-btn:hover{background:#178a47;}
    .undo-btn{font-family:var(--font-hand); font-size:1rem; cursor:pointer; background:transparent; color:#555; border:2px solid #aaa; border-radius:9px; padding:8px 12px;}
  </style>
</head>
<body>
  <header>
    <h1>Golden House <small>Kjøkkenskjerm</small></h1>
    <div class="head-right">
      <span class="pill"><span id="newCount">0</span> nye</span>
      <span class="clock" id="clock">--:--</span>
      <button class="btn" id="muteBtn" title="Lyd ved ny bestilling">🔔 Lyd: på</button>
      <button class="btn" id="toggleDone">Vis fullførte</button>
      <button class="btn" id="clearDone">Tøm fullførte</button>
    </div>
  </header>

  <p class="banner" id="banner">
    Demo: viser bestillinger som er lagt inn i <b>denne nettleseren</b>.
    Fase 2 = live skjerm på kjøkkenet via server (se README).
  </p>

  <div class="board" id="board"></div>

  <script src="menu.js"></script>
  <script>
  (function () {
    const ORDERS_KEY = "goldenhouse_orders";
    const $ = (s) => document.querySelector(s);
    let showDone = false;
    let muted = false;
    let lastNewCount = 0;

    const load = () => { try { return JSON.parse(localStorage.getItem(ORDERS_KEY)) || []; } catch { return []; } };
    const save = (a) => { try { localStorage.setItem(ORDERS_KEY, JSON.stringify(a)); } catch {} };
    const esc = (s) => String(s).replace(/[&<>"']/g, (c) => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));

    function ago(ts) {
      const m = Math.floor((Date.now() - ts) / 60000);
      const t = new Date(ts).toLocaleTimeString("no-NO", { hour: "2-digit", minute: "2-digit" });
      if (m < 1) return `${t} · nå nettopp`;
      return `${t} · for ${m} min siden`;
    }

    function render() {
      const all = load().sort((a, b) => b.ts - a.ts);
      const ny = all.filter((o) => o.status !== "ferdig");
      const list = showDone ? all : ny;
      $("#newCount").textContent = ny.length;
      $("#toggleDone").textContent = showDone ? "Skjul fullførte" : "Vis fullførte";

      const board = $("#board");
      if (!list.length) {
        board.innerHTML = `<div class="empty"><span>🍜</span>Ingen bestillinger akkurat nå.<br>Klar for første ordre!</div>`;
      } else {
        board.innerHTML = list.map(ticket).join("");
        board.querySelectorAll("[data-done]").forEach((b) =>
          b.addEventListener("click", () => setStatus(b.dataset.done, "ferdig")));
        board.querySelectorAll("[data-undo]").forEach((b) =>
          b.addEventListener("click", () => setStatus(b.dataset.undo, "ny")));
      }

      // chime when a new order arrives
      if (ny.length > lastNewCount && !muted) chime();
      lastNewCount = ny.length;
    }

    function ticket(o) {
      const done = o.status === "ferdig";
      return `
        <div class="ticket ${done ? "done" : ""}">
          <div class="ticket__top">
            <span class="ticket__no">${esc(o.ticket || "#")}</span>
            <span class="ticket__time">${ago(o.ts)}</span>
          </div>
          <div class="ticket__cust"><b>${esc(o.name || "")}</b> · 📞 ${esc(o.phone || "")}</div>
          <div class="ticket__pickup">🕒 ${esc(o.pickup || "")}</div>
          <ul class="lines">
            ${o.items.map((it) => `<li><span class="q">${it.qty}×</span><span class="nm">${it.no != null ? "<b>" + it.no + ".</b> " : ""}${esc(it.name)}</span><span>${it.qty * it.price} kr</span></li>`).join("")}
          </ul>
          ${o.note ? `<div class="note"><b>Merk:</b> ${esc(o.note)}</div>` : ""}
          <div class="ticket__total"><span>Totalt</span><span>${o.total} kr</span></div>
          <div class="ticket__act">
            ${done
              ? `<button class="undo-btn" data-undo="${o.id}">Angre</button>`
              : `<button class="done-btn" data-done="${o.id}">✓ Ferdig</button>`}
          </div>
        </div>`;
    }

    function setStatus(id, status) {
      const all = load();
      const o = all.find((x) => x.id === id);
      if (o) { o.status = status; save(all); render(); }
    }

    // small WebAudio "ding" so the kitchen hears new orders
    let actx;
    function chime() {
      try {
        actx = actx || new (window.AudioContext || window.webkitAudioContext)();
        [880, 1320].forEach((f, i) => {
          const o = actx.createOscillator(), g = actx.createGain();
          o.type = "sine"; o.frequency.value = f;
          o.connect(g); g.connect(actx.destination);
          const t = actx.currentTime + i * 0.16;
          g.gain.setValueAtTime(0.0001, t);
          g.gain.exponentialRampToValueAtTime(0.25, t + 0.02);
          g.gain.exponentialRampToValueAtTime(0.0001, t + 0.32);
          o.start(t); o.stop(t + 0.34);
        });
      } catch {}
    }

    $("#toggleDone").addEventListener("click", () => { showDone = !showDone; render(); });
    $("#muteBtn").addEventListener("click", (e) => {
      muted = !muted; e.target.textContent = muted ? "🔕 Lyd: av" : "🔔 Lyd: på";
      if (!muted) chime();
    });
    $("#clearDone").addEventListener("click", () => {
      if (!confirm("Fjerne alle fullførte bestillinger fra skjermen?")) return;
      save(load().filter((o) => o.status !== "ferdig")); render();
    });

    function tick() {
      $("#clock").textContent = new Date().toLocaleTimeString("no-NO", { hour: "2-digit", minute: "2-digit" });
    }
    tick(); setInterval(tick, 10000);

    // live-ish: update on storage changes from the order tab + light polling
    window.addEventListener("storage", (e) => { if (e.key === ORDERS_KEY) render(); });
    setInterval(render, 3000);
    render();
  })();
  </script>
</body>
</html>
